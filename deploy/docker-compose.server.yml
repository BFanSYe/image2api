# =====================================================
# image2api · 单机服务器容器栈（真实 provider）
#
# 启动：
#   cd deploy
#   docker compose -f docker-compose.server.yml -f docker-compose.no-edge.yml up -d --build
#
# 端口（host -> container）：
#   user-web    : 127.0.0.1:17080 -> 80
#   admin-web   : 127.0.0.1:17088 -> 80
#   api         : 127.0.0.1:17180 -> 17180
#   admin       : 127.0.0.1:17188 -> 17188
#   openai      : 127.0.0.1:17200 -> 17200
#   mysql       : 127.0.0.1:23306 -> 3306
#   redis       : 127.0.0.1:16379 -> 6379
#
# 注意：本文件默认使用 real provider，不是 mock 开发栈。
# =====================================================

x-backend-env: &backend-env
  IMAGE2API_ENV: dev
  IMAGE2API_DB_DSN: image2api:image2api123@tcp(mysql:3306)/image2api?charset=utf8mb4&parseTime=True&loc=Local
  IMAGE2API_REDIS_ADDR: redis:6379
  IMAGE2API_REDIS_PASSWORD: ''
  IMAGE2API_REDIS_DB: '0'
  IMAGE2API_JWT_SECRET: local-dev-jwt-secret-32bytes-please-change
  IMAGE2API_JWT_REFRESH_SECRET: local-dev-jwt-refresh-secret-32bytes-please
  IMAGE2API_JWT_ACCESS_TTL: 2h
  IMAGE2API_JWT_REFRESH_TTL: 336h
  IMAGE2API_AES_KEY: '00000000000000000000000000000000'
  IMAGE2API_PROVIDER_GPT: real
  IMAGE2API_PROVIDER_GROK: real
  IMAGE2API_OPENAI_BASE: https://api.openai.com
  IMAGE2API_GROK_BASE: https://api.x.ai
  IMAGE2API_GPT_BASE_URL: https://api.openai.com
  IMAGE2API_GROK_BASE_URL: https://grok.com
  IMAGE2API_GROK_CF_STATE_PATH: /app/storage/grok_cf.json
  IMAGE2API_GROK_UPLOAD_NORMALIZE_JPEG: 'true'
  IMAGE2API_GROK_DYNAMIC_STATSIG: 'true'
  IMAGE2API_LOG_LEVEL: info
  IMAGE2API_LOG_DIR: /app/logs
  IMAGE2API_STORAGE_ROOT: /app/storage/public
  IMAGE2API_CORS_ORIGINS: http://localhost:17080,http://localhost:17088,http://127.0.0.1:17080,http://127.0.0.1:17088
  TZ: Asia/Shanghai

services:
  mysql:
    image: mysql:8.0
    container_name: image2api-mysql-dev
    restart: unless-stopped
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=512M
      - --max_connections=200
      - --binlog-expire-logs-seconds=86400
      - --max-binlog-size=64M
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: image2api-root-dev
      MYSQL_DATABASE: image2api
      MYSQL_USER: image2api
      MYSQL_PASSWORD: image2api123
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${IMAGE2API_DEV_MYSQL_PORT:-23306}:3306"
    volumes:
      - image2api-mysql-dev-data:/var/lib/mysql
      - ./mysql-init/01-run-migrations.sh:/docker-entrypoint-initdb.d/01-run-migrations.sh:ro
      - ../backend/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pimage2api-root-dev"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [image2api-dev]

  redis:
    image: redis:7-alpine
    container_name: image2api-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${IMAGE2API_DEV_REDIS_PORT:-16379}:6379"
    volumes:
      - image2api-redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [image2api-dev]

  # ---------- 4 个后端 cmd ----------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: image2api-flaresolverr-dev
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:18191:8191"
    networks: [image2api-dev]

  api:
    image: image2api/backend:dev
    container_name: image2api-api-dev
    build:
      context: ../backend
      dockerfile: Dockerfile
    entrypoint: ["/app/api"]
    user: "0:0"            # 复用同一镜像同一卷写日志，方便起见 dev 用 root
    environment:
      <<: *backend-env
      IMAGE2API_NODE_ID: '1'
    ports:
      - "127.0.0.1:17180:17180"
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17180"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      flaresolverr: { condition: service_started }
    networks: [image2api-dev]
    restart: unless-stopped

  admin:
    image: image2api/backend:dev
    container_name: image2api-admin-dev
    entrypoint: ["/app/admin"]
    user: "0:0"
    environment:
      <<: *backend-env
      IMAGE2API_NODE_ID: '2'
    ports:
      - "127.0.0.1:17188:17188"
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17188"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      api: { condition: service_started }
    networks: [image2api-dev]
    restart: unless-stopped

  openai:
    image: image2api/backend:dev
    container_name: image2api-openai-dev
    entrypoint: ["/app/openai"]
    user: "0:0"
    environment:
      <<: *backend-env
      IMAGE2API_NODE_ID: '3'
    ports:
      - "127.0.0.1:17200:17200"
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17200"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      api: { condition: service_started }
    networks: [image2api-dev]
    restart: unless-stopped

  worker:
    image: image2api/backend:dev
    container_name: image2api-worker-dev
    entrypoint: ["/app/worker"]
    user: "0:0"
    environment:
      <<: *backend-env
      IMAGE2API_NODE_ID: '4'
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      flaresolverr: { condition: service_started }
    networks: [image2api-dev]
    restart: unless-stopped

  # ---------- 前端静态 + 反代 ----------
  user-web:
    image: image2api/user-web:dev
    container_name: image2api-user-web-dev
    build:
      context: ../frontend
      dockerfile: apps/user/Dockerfile
    ports:
      - "17080:80"
    volumes:
      # 覆盖镜像内自带的 nginx.conf，加入 /api 与 /v1 反代
      - ./nginx-dev/user-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api, openai]
    networks: [image2api-dev]
    restart: unless-stopped

  admin-web:
    image: image2api/admin-web:dev
    container_name: image2api-admin-web-dev
    build:
      context: ../frontend
      dockerfile: apps/admin/Dockerfile
    ports:
      - "17088:80"
    volumes:
      - ./nginx-dev/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [admin]
    networks: [image2api-dev]
    restart: unless-stopped

  edge:
    image: caddy:2-alpine
    container_name: image2api-edge-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - image2api-caddy-data:/data
      - image2api-caddy-config:/config
    depends_on: [user-web]
    networks: [image2api-dev]
    restart: unless-stopped

volumes:
  image2api-mysql-dev-data:
  image2api-redis-dev-data:
  image2api-logs:
  image2api-storage:
  image2api-caddy-data:
  image2api-caddy-config:

networks:
  image2api-dev:
    name: image2api-dev-net
