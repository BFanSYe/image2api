# =====================================================
# image2api · 本地开发依赖（只起 MySQL + Redis）
#
# 使用：
#   cd deploy
#   docker compose -f docker-compose.dev.yml up -d
#
# 目的：本地依赖容器化，后端 4 个 cmd / 前端 2 个 app
# 直接在主机 go run / pnpm dev，便于热重载和断点调试。
#
# 端口（host -> container）：
#   MySQL  : 13306 -> 3306
#   Redis  : 16379 -> 6379
# =====================================================

services:
  mysql:
    image: mysql:8.0
    container_name: image2api-mysql-dev
    restart: unless-stopped
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=512M
      - --max_connections=200
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: image2api-root-dev
      MYSQL_DATABASE: image2api
      MYSQL_USER: image2api
      MYSQL_PASSWORD: image2api123
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${IMAGE2API_DEV_MYSQL_PORT:-13306}:3306"
    volumes:
      - image2api-mysql-dev-data:/var/lib/mysql
      # 首次初始化时自动跑迁移：自定义脚本会剥掉 goose Down 段后再喂给 mysql
      - ./mysql-init/01-run-migrations.sh:/docker-entrypoint-initdb.d/01-run-migrations.sh:ro
      - ../backend/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pimage2api-root-dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: image2api-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${IMAGE2API_DEV_REDIS_PORT:-16379}:6379"
    volumes:
      - image2api-redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  image2api-mysql-dev-data:
  image2api-redis-dev-data:
