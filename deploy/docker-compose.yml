# =====================================================
# image2api · 单机生产 docker-compose
# 启动：docker compose --env-file ./env/.env.local up -d
# 端口策略见 docs/01-开发规范-总览.md §端口规范
# =====================================================

x-common-env: &common-env
  IMAGE2API_ENV: ${IMAGE2API_ENV:-prod}
  IMAGE2API_DB_DSN: ${IMAGE2API_DB_DSN}
  IMAGE2API_REDIS_ADDR: ${IMAGE2API_REDIS_ADDR:-redis:6379}
  IMAGE2API_REDIS_PASSWORD: ${IMAGE2API_REDIS_PASSWORD:-}
  IMAGE2API_JWT_SECRET: ${IMAGE2API_JWT_SECRET}
  IMAGE2API_JWT_REFRESH_SECRET: ${IMAGE2API_JWT_REFRESH_SECRET}
  IMAGE2API_AES_KEY: ${IMAGE2API_AES_KEY}
  IMAGE2API_OPENAI_BASE: ${IMAGE2API_OPENAI_BASE:-https://api.openai.com}
  IMAGE2API_GROK_BASE: ${IMAGE2API_GROK_BASE:-https://api.x.ai}
  IMAGE2API_PROVIDER_GPT: ${IMAGE2API_PROVIDER_GPT:-real}
  IMAGE2API_PROVIDER_GROK: ${IMAGE2API_PROVIDER_GROK:-real}
  IMAGE2API_GPT_BASE_URL: ${IMAGE2API_GPT_BASE_URL:-https://api.openai.com}
  IMAGE2API_GROK_BASE_URL: ${IMAGE2API_GROK_BASE_URL:-https://grok.com}
  IMAGE2API_GROK_CF_STATE_PATH: ${IMAGE2API_GROK_CF_STATE_PATH:-/app/storage/grok_cf.json}
  IMAGE2API_GROK_UPLOAD_NORMALIZE_JPEG: ${IMAGE2API_GROK_UPLOAD_NORMALIZE_JPEG:-true}
  IMAGE2API_GROK_DYNAMIC_STATSIG: ${IMAGE2API_GROK_DYNAMIC_STATSIG:-true}
  IMAGE2API_CORS_ORIGINS: ${IMAGE2API_CORS_ORIGINS}
  IMAGE2API_LOG_DIR: /app/logs
  IMAGE2API_STORAGE_ROOT: ${IMAGE2API_STORAGE_ROOT:-/app/storage/public}
  TZ: Asia/Shanghai

services:
  mysql:
    image: mysql:8.0
    container_name: image2api-mysql
    restart: always
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=2G
      - --max_connections=300
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: ${IMAGE2API_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${IMAGE2API_MYSQL_DB:-image2api}
      MYSQL_USER: ${IMAGE2API_MYSQL_USER:-image2api}
      MYSQL_PASSWORD: ${IMAGE2API_MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:${IMAGE2API_MYSQL_PORT:-13306}:3306"
    volumes:
      - image2api-mysql-data:/var/lib/mysql
      # 首次初始化时执行 goose Up 段，避免 mysql 直接执行 Down 把表删空
      - ./mysql-init/01-run-migrations.sh:/docker-entrypoint-initdb.d/01-run-migrations.sh:ro
      - ../backend/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      retries: 6
    networks: [image2api]

  redis:
    image: redis:7-alpine
    container_name: image2api-redis
    restart: always
    command: redis-server --appendonly yes ${IMAGE2API_REDIS_PASSWORD:+--requirepass ${IMAGE2API_REDIS_PASSWORD}}
    ports:
      - "127.0.0.1:${IMAGE2API_REDIS_PORT:-16379}:6379"
    volumes:
      - image2api-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 6
    networks: [image2api]

  api:
    image: image2api/backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: image2api-api
    restart: always
    command: ["/app/api"]
    environment:
      <<: *common-env
      IMAGE2API_NODE_ID: 1
    expose: ["17180"]
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17180"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G }
    networks: [image2api]

  admin:
    image: image2api/backend:latest
    container_name: image2api-admin
    restart: always
    command: ["/app/admin"]
    environment:
      <<: *common-env
      IMAGE2API_NODE_ID: 2
    expose: ["17188"]
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17188"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '1', memory: 512M }
    networks: [image2api]

  openai:
    image: image2api/backend:latest
    container_name: image2api-openai
    restart: always
    command: ["/app/openai"]
    environment:
      <<: *common-env
      IMAGE2API_NODE_ID: 3
    expose: ["17200"]
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck", "-addr", "127.0.0.1:17200"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G }
    networks: [image2api]

  worker:
    image: image2api/backend:latest
    container_name: image2api-worker
    restart: always
    command: ["/app/worker"]
    environment:
      <<: *common-env
      IMAGE2API_NODE_ID: 4
    volumes:
      - image2api-logs:/app/logs
      - image2api-storage:/app/storage
    depends_on:
      mysql:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G }
    networks: [image2api]

  user-web:
    image: image2api/user-web:latest
    build:
      context: ../frontend
      dockerfile: apps/user/Dockerfile
    container_name: image2api-user-web
    restart: always
    expose: ["80"]
    networks: [image2api]

  admin-web:
    image: image2api/admin-web:latest
    build:
      context: ../frontend
      dockerfile: apps/admin/Dockerfile
    container_name: image2api-admin-web
    restart: always
    expose: ["80"]
    networks: [image2api]

  nginx:
    image: nginx:1.27-alpine
    container_name: image2api-nginx
    restart: always
    depends_on: [api, admin, openai, user-web, admin-web]
    ports:
      - "${IMAGE2API_USER_WEB_PORT:-17080}:17080"
      - "${IMAGE2API_ADMIN_WEB_PORT:-17088}:17088"
      - "${IMAGE2API_OPENAI_PORT:-17200}:17200"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - image2api-logs:/var/log/nginx
    networks: [image2api]

volumes:
  image2api-mysql-data:
  image2api-redis-data:
  image2api-logs:
  image2api-storage:

networks:
  image2api:
    name: image2api-net
